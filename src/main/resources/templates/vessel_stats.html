<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мониторинг судна</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@master/en/v6.15.1/css/ol.css" type="text/css">
    <script src="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@master/en/v6.15.1/build/ol.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Жестко задаем высоту контейнеру карты */
        #map {
            height: 400px !important;
            width: 100%;
            background-color: #f0f0f0; /* Чтобы видеть блок, пока карта грузится */
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }

        /* На всякий случай зафиксируем высоту графика */
        #tempChart {
            max-height: 300px;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="/dashboard" class="btn btn-outline-secondary">← К списку</a>
    </div>

</div>
</body>
<div th:if="${not #lists.isEmpty(alerts)}" class="mb-4">
    <div th:each="alert : ${alerts}"
         class="alert alert-dismissible fade show"
         th:classappend="${alert.alertType == 'STORM' ? 'alert-danger' : 'alert-warning'}"
         role="alert">

        <strong>ВНИМАНИЕ!</strong>
        <span th:text="${alert.alertType + ' - ' + alert.message}">Описание проблемы</span>

        <span class="text-muted ms-2" th:text="${#temporals.format(alert.timestamp, 'dd-MM-yyyy HH:mm')}"></span>

        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>
<div class="container">
    <div class="stats-header">
        <h1>Данные о судне IMO: <span th:text="${vesselImo}">0000000</span></h1>
    </div>

    <div class="dashboard-container" style="display: flex; flex-direction: column; gap: 30px; padding: 20px;">

        <div class="card">
            <h3 style="margin-top: 0;">Текущее местоположение и маршрут</h3>
            <div id="map" style="height: 400px; width: 100%; border: 1px solid #ccc; border-radius: 8px;"></div>
        </div>

        <div class="card">
            <h3>История температуры (°C)</h3>
            <div style="height: 300px; width: 100%; position: relative;">
                <canvas id="tempChart"></canvas>
            </div>
        </div>

    </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Последние измерения</h5>
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>Время</th>
                    <th>Темп. (°C)</th>
                    <th>Влж. (%)</th> <th>Давл. (мм)</th> <th>Скорость (узлы)</th>
                    <th>Ветер (м/с)</th>
                    <th>Напр. ветра</th> <th>Координаты</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${history}">
                    <td th:text="${m.timestampFormatted}">--:--</td>
                    <td th:text="${m.temperature}">0</td>
                    <td th:text="${m.humidity}">0</td> <td th:text="${m.pressure}">0</td> <td th:text="${m.speed}">0</td>
                    <td th:text="${m.windSpeed}">0</td>
                    <td th:text="${m.windDirection + '°'}">0</td> <td th:text="${m.latitude + ', ' + m.longitude}">0, 0</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

<script th:inline="javascript">
    window.onload = function() {
        const historyData = [[${history}]];
        if (!historyData || historyData.length === 0) return;

        try {
            const lastPos = historyData[0];
            const centerCoords = ol.proj.fromLonLat([parseFloat(lastPos.longitude), parseFloat(lastPos.latitude)]);

            // 1. Создаем массив всех объектов для карты
            const features = [];

            // 2. Линия маршрута
            const pathCoords = historyData
                .map(m => ol.proj.fromLonLat([parseFloat(m.longitude), parseFloat(m.latitude)]))
                .reverse();

            const lineFeature = new ol.Feature({ geometry: new ol.geom.LineString(pathCoords) });
            lineFeature.setStyle(new ol.style.Style({
                stroke: new ol.style.Stroke({ color: '#007bff', width: 3 })
            }));
            features.push(lineFeature);

            // 3. Точки для ВСЕХ позиций из истории
            historyData.forEach((m, index) => {
                const coord = ol.proj.fromLonLat([parseFloat(m.longitude), parseFloat(m.latitude)]);
                const pointFeature = new ol.Feature({ geometry: new ol.geom.Point(coord) });

                if (index === 0) {
                    // Самая последняя точка (Красная и большая)
                    pointFeature.setStyle(new ol.style.Style({
                        image: new ol.style.Circle({
                            radius: 8,
                            fill: new ol.style.Fill({color: '#ff0000'}),
                            stroke: new ol.style.Stroke({color: '#ffffff', width: 2})
                        })
                    }));
                } else {
                    // Старые точки (Синие и маленькие)
                    pointFeature.setStyle(new ol.style.Style({
                        image: new ol.style.Circle({
                            radius: 4,
                            fill: new ol.style.Fill({color: '#007bff'}),
                            stroke: new ol.style.Stroke({color: '#ffffff', width: 1})
                        })
                    }));
                }
                features.push(pointFeature);
            });

            // 4. Инициализация карты
            const map = new ol.Map({
                target: 'map',
                layers: [
                    new ol.layer.Tile({ source: new ol.source.OSM() }),
                    new ol.layer.Vector({
                        source: new ol.source.Vector({ features: features })
                    })
                ],
                view: new ol.View({ center: centerCoords, zoom: 12 })
            });

            setTimeout(() => { map.updateSize(); }, 300);

        } catch (e) { console.error("Map Error:", e); }

        // --- ГРАФИК ---
        try {
            const ctx = document.getElementById('tempChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: historyData.map(m => m.timestampFormatted).reverse(),
                    datasets: [{
                        label: 'Температура',
                        data: historyData.map(m => m.temperature).reverse(),
                        borderColor: '#007bff',
                        backgroundColor: 'rgba(0, 123, 255, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: 10 }
                }
            });
        } catch (e) { console.error("Chart Error:", e); }
    };
</script>

</body>
</html>
