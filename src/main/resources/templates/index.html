<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Мониторинг Флота</title>
    <div th:replace="~{fragments :: header_common}"></div>
</head>
<body class="bg-light">
<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Список активных судов</h2>
        <span class="badge bg-primary" th:text="${distinctImos.totalElements + ' всего'}"></span>
    </div>

    <div class="row">
        <div th:each="vessel : ${distinctImos.content}" class="col-md-4 col-sm-6 mb-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title mb-0">
                            <span class="text-muted small">IMO:</span>
                            <strong th:text="${vessel.vesselImo}">9071234</strong>
                        </h5>
                    </div>

                    <hr class="my-2 text-muted">

                    <div class="card-text">
                        <div class="d-flex justify-content-between small mb-1">
                            <span>Скорость:</span>
                            <span class="fw-bold" th:text="${vessel.speed + ' уз.'}">0</span>
                        </div>
                        <div class="d-flex justify-content-between small">
                            <span>Координаты:</span>
                            <span class="text-truncate ms-2" th:text="${vessel.latitude + ', ' + vessel.longitude}">0, 0</span>
                        </div>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-0 pb-3">
                    <a th:href="@{'/dashboard/vessel/' + ${vessel.vesselImo}}"
                       class="btn btn-sm btn-primary w-100">Открыть панель управления</a>
                </div>
            </div>
        </div>
    </div>

    <nav th:if="${distinctImos.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${distinctImos.first} ? 'disabled'">
                <a class="page-link" th:href="@{/(page=${distinctImos.number - 1})}">Назад</a>
            </li>
            <li class="page-item active">
                <span class="page-link" th:text="${distinctImos.number + 1}"></span>
            </li>
            <li class="page-item" th:classappend="${distinctImos.last} ? 'disabled'">
                <a class="page-link" th:href="@{/(page=${distinctImos.number + 1})}">Вперед</a>
            </li>
        </ul>
    </nav>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
